services:
  app:
    build: .
    image: smart-meeting-notes
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
